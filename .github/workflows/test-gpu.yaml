name: Test on GPU

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: read
  actions: read

jobs:
  zksync-airbender-build:
    runs-on: [ ubuntu-latest ]
    strategy:
      fail-fast: false
      matrix:
        # matterlabs-ci-gpu-runner currently has CUDA 12.2 driver support only, so
        # CUDA 13-compiled binaries are not runnable there.
        cuda: [ "12.9.1-devel-ubuntu22.04" ]
        package: [ "zksmith" ]
        security: [ "security_80", "security_100" ]
    container:
      image: nvidia/cuda:${{ matrix.cuda }}
    env:
      RUST_TOOLCHAIN: nightly-2026-02-10
    steps:
      - name: Prepare environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt update && apt install -y cmake git jq libssl-dev pkg-config wget curl
          echo "/usr/local/nvidia/bin:/usr/local/cuda/bin" >> $GITHUB_PATH

      - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8 # v3

      - name: Setup rustup
        run: |
          wget -q -O - https://sh.rustup.rs | bash -s -- -y --default-toolchain $RUST_TOOLCHAIN --profile minimal
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          echo "export PATH=\"$HOME/.cargo/bin:\$PATH\"" >> "${HOME}/.bash_profile"

      # we need cmake 3.30 (as 3.24 doesn't properly pass cuda_standard_20)
      - name: Setup CMAKE
        run: |
          curl -LO https://github.com/Kitware/CMake/releases/download/v3.30.2/cmake-3.30.2-linux-x86_64.sh && \
            chmod +x cmake-3.30.2-linux-x86_64.sh && \
            ./cmake-3.30.2-linux-x86_64.sh --skip-license --prefix=/usr/local

      - name: Check CUDA version
        run: |
          nvcc --version


      - name: Build tests and copy binary to a separate dir
        shell: bash
        run: |
          mkdir artifacts
          # Build for A100 (sm_80), L4 (sm_89), and H100 (sm_90).
          CUDAARCHS="80;89;90" CARGO_TARGET_DIR=./build \
          cargo +$RUST_TOOLCHAIN test -p ${{ matrix.package }} --no-default-features --features gpu,${{ matrix.security }} --no-run --release --target x86_64-unknown-linux-gnu --message-format=json -q \
          | jq -r 'select(.executable != null) | .executable' \
          | while read binary; do
            cp "$binary" artifacts/${{ matrix.package }}
          done

      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: zksync-airbender-${{ matrix.cuda }}-${{ matrix.package }}-${{ matrix.security }}-test-binary
          path: artifacts/${{ matrix.package }}
          if-no-files-found: error

  zksync-airbender-test:
    runs-on: [ matterlabs-ci-gpu-runner ]
    strategy:
      fail-fast: false
      matrix:
        # Keep this aligned with the build matrix because runner driver support is
        # currently limited to CUDA 12.2 (CUDA 13 artifacts fail at runtime).
        cuda: [ "12.9.1-devel-ubuntu22.04" ]
        package: [ "zksmith" ]
        security: [ "security_80", "security_100" ]

    needs: zksync-airbender-build
    steps:
      - name: Prepare environment
        run: |
          echo "/usr/local/nvidia/bin:/usr/local/cuda/bin" >> $GITHUB_PATH

      - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8 # v3

      - name: Check Nvidia driver version
        run: |
          nvidia-smi

      - name: Configure low VRAM mode
        shell: bash
        run: |
          set -euo pipefail
          gpu_info="$(nvidia-smi --query-gpu=memory.total --format=csv,noheader)"
          min_full_vram_mib=32768
          low_vram_mode=0
          while IFS=',' read -r memory; do
            memory_mib="$(echo "$memory" | tr -dc '0-9')"
            if [[ "$memory_mib" -lt "$min_full_vram_mib" ]]; then
              low_vram_mode=1
              break
            fi
          done <<< "$gpu_info"
          if [[ "$low_vram_mode" -eq 1 ]]; then
            echo "ZKSYNC_AIRBENDER_LOW_VRAM_MODE=1" >> "$GITHUB_ENV"
            echo "Enabled low VRAM mode"
          else
            echo "Low VRAM mode is not required"
          fi

      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: zksync-airbender-${{ matrix.cuda }}-${{ matrix.package }}-${{ matrix.security }}-test-binary
          path: zksync-airbender-test-binary/

      - name: Run test binary
        run: |
          chmod +x zksync-airbender-test-binary/${{ matrix.package }}
          zksync-airbender-test-binary/${{ matrix.package }} --exact tests::test_local_prover_with_files --nocapture
