name: "Rust CI"
on:
  push:
    branches:
      - main
      - stable
      - dev
  pull_request:

permissions: read-all

jobs:
  tests:
    name: tests
    runs-on: [matterlabs-ci-runner-highmem]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile minimal
      - name: Compile
        run: cargo build --verbose
      - name: Unit tests (CI)
        env:
          CI: "true"
        run: cargo test --profile cli -- --nocapture

  formatting:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile minimal
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@v1

  circuits_generated:
    name: circuits_generated
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile default
      - name: Regenerate verifiers
        run: ./recreate_verifiers.sh
      - name: Check if anything has changed
        run: |
          MODIFIED_FILES=$(git status --porcelain)
          if [ -n "$MODIFIED_FILES" ]; then
            echo "The following files were modified - did you run ./recreate_verifiers.sh? "
            echo "$MODIFIED_FILES"
            exit 1
          else
            echo "No files were modified."
          fi

  build_verifier:
    runs-on: [matterlabs-ci-runner-c3d]
    name: build_verifier
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Setup
        working-directory: tools/verifier
        run: |
          rustup set profile minimal
          rustup target add riscv32i-unknown-none-elf
          cargo install cargo-binutils
          rustup component add llvm-tools-preview
          rustup component add rust-src
      - name: ObjCopy
        working-directory: tools/verifier
        run: cargo objcopy --release  -Z build-std=core,panic_abort,alloc -- -O binary app.bin
      - uses: actions/upload-artifact@v4
        with:
          name: verifier
          path: tools/verifier/app.bin

  build_cli_with_verify_80:
    name: build_cli_with_verify_80
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Setup
        run: rustup set profile minimal
      - name: Compile
        run: cargo build --release -p cli --no-default-features --features include_verifiers_80
      - uses: actions/upload-artifact@v4
        with:
          name: cli_with_verify_80
          path: |
            target/release/cli
            examples/basic_fibonacci/app.bin
            examples/basic_fibonacci/app.text

  build_cli_with_verify_100:
    name: build_cli_with_verify_100
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Setup
        run: rustup set profile minimal
      - name: Compile
        run: cargo build --release -p cli --no-default-features --features include_verifiers_100
      - uses: actions/upload-artifact@v4
        with:
          name: cli_with_verify_100
          path: |
            target/release/cli
            examples/basic_fibonacci/app.bin
            examples/basic_fibonacci/app.text

  build_cli_no_verifiers_80:
    name: build_cli_no_verifiers_80
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Setup
        run: rustup set profile minimal
      - name: Compile
        run: cargo build --release -p cli --no-default-features --features security_80

  build_cli_no_verifiers_100:
    name: build_cli_no_verifiers_100
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Setup
        run: rustup set profile minimal
      - name: Compile
        run: cargo build --release -p cli --no-default-features --features security_100

  cli_smoke_80_base_verify:
    name: cli_smoke_80_base_verify
    runs-on: [matterlabs-ci-runner-c3d]
    needs: [build_cli_with_verify_80]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli_with_verify_80
      - name: Setup
        run: |
          chmod +x ./target/release/cli
          mkdir -p output
      - name: Run
        run: ./target/release/cli run --bin examples/basic_fibonacci/app.bin --expected-results 144
      - name: Prove
        run: ./target/release/cli prove --bin examples/basic_fibonacci/app.bin --target base --backend cpu --cpu-cycles-bound 16777216 --cpu-worker-threads 8 --output-dir output --output-file proof.json
      - name: Verify
        run: ./target/release/cli verify --proof output/proof.json --bin examples/basic_fibonacci/app.bin

  cli_smoke_100_base_verify:
    name: cli_smoke_100_base_verify
    runs-on: [matterlabs-ci-runner-c3d]
    needs: [build_cli_with_verify_100]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli_with_verify_100
      - name: Setup
        run: |
          chmod +x ./target/release/cli
          mkdir -p output
      - name: Run
        run: ./target/release/cli run --bin examples/basic_fibonacci/app.bin --expected-results 144
      - name: Prove
        run: ./target/release/cli prove --bin examples/basic_fibonacci/app.bin --target base --backend cpu --cpu-cycles-bound 16777216 --cpu-worker-threads 8 --output-dir output --output-file proof.json
      - name: Verify
        run: ./target/release/cli verify --proof output/proof.json --bin examples/basic_fibonacci/app.bin

  cli_smoke_80_recursion_unified_verify:
    name: cli_smoke_80_recursion_unified_verify
    runs-on: [matterlabs-ci-runner-c3d]
    needs: [build_cli_with_verify_80]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli_with_verify_80
      - name: Setup
        run: |
          chmod +x ./target/release/cli
          mkdir -p output
      - name: Prove recursion unified
        run: ./target/release/cli prove --bin examples/basic_fibonacci/app.bin --target recursion-unified --backend cpu --output-dir output --output-file recursion_unified.json
      - name: Verify recursion unified
        run: ./target/release/cli verify --proof output/recursion_unified.json --bin examples/basic_fibonacci/app.bin

  cli_smoke_100_recursion_unified_verify:
    name: cli_smoke_100_recursion_unified_verify
    runs-on: [matterlabs-ci-runner-c3d]
    needs: [build_cli_with_verify_100]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli_with_verify_100
      - name: Setup
        run: |
          chmod +x ./target/release/cli
          mkdir -p output
      - name: Prove recursion unified
        run: ./target/release/cli prove --bin examples/basic_fibonacci/app.bin --target recursion-unified --backend cpu --output-dir output --output-file recursion_unified.json
      - name: Verify recursion unified
        run: ./target/release/cli verify --proof output/recursion_unified.json --bin examples/basic_fibonacci/app.bin
